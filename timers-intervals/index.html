<!-- progress-bar -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../timers-intervals/script.js" defer></script>
    <title>Timers and Intervals</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
      }

      .progress-container {
        width: 400px;
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        color: #333;
        margin-top: 0;
      }

      .progress-bar-container {
        width: 100%;
        height: 30px;
        background-color: #e0e0e0;
        border-radius: 15px;
        overflow: hidden;
        margin: 20px 0;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #45a049);
        transition: width 0.1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .progress-text {
        text-align: center;
        font-size: 18px;
        color: #333;
        margin-top: 10px;
      }

      .status {
        text-align: center;
        color: #666;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="progress-container">
      <h2>Downloading...</h2>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
      <div class="status" id="status">Starting download...</div>
    </div>
  </body>
</html>
